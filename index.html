<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"> <title>TyperX – Login</title>
  <link rel="stylesheet" href="style.css">
  <script src="ZORO.js" defer></script> </head>
<body>
  <div class="bg-grid"></div>
  <div class="bg-glow"></div>
  <div class="toast" id="toast"></div>

  <div class="page active" id="page-login">
    <div class="logo">SPEEDDD</div>
    <div class="logo-sub">Test Your Typing Speed</div>
    .

    
    <div class="card">
      <div class="form-title">WELCOME!!</div>
      
      <div class="form-group">
        <label class="form-label">Display Username</label>
        <input class="form-input" type="text" id="inp-name" placeholder="Enter name" maxlength="20"/>
      </div>
      <div id="err-name" class="error-msg">User Name must be 2 to 20 characters</div>

      <div class="form-group">
        <label class="form-label">Email Address</label>
        <input class="form-input" type="email" id="inp-email" placeholder="abc@example.com"/>
      </div>
      <div id="err-email" class="error-msg">Enter a valid email address</div>

      <div class="form-group">
        <label class="form-label">Password</label>
        <input class="form-input" type="password" id="inp-pass"/>
      </div>
      <div id="err-pass" class="error-msg">The Password must be 6 or more characters</div>

      <div class="form-group">
        <label class="form-label" style="margin-bottom:10px;">Please Select Difficulty</label>
        <div class="diff-group">
          <button class="diff-btn selected" data-diff="easy" onclick="selectDiff(this)">Easy</button>
          <button class="diff-btn" data-diff="medium" onclick="selectDiff(this)">Medium</button>
          <button class="diff-btn" data-diff="hard" onclick="selectDiff(this)">Hard</button>
        </div>
      </div>

      <button class="btn" onclick="handleLogin()">START TYPING</button>
      <button class="btn btn-outline" onclick="window.location.href='scoreboard.html'">VIEW SCOREBOARD</button>
    </div>
  </div>
</body>
</html>
