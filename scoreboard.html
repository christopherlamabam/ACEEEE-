<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>TyperX – Scoreboard</title>
  <link rel="stylesheet" href="style.css">
    <script src="ZORO.js"></script>
</head>
<body>

  <div class="bg-grid"></div>
  <div class="bg-glow"></div>
  <div class="toast" id="toast"></div>

  <div class="page active" id="page-score">
    <div class="score-header">
      <div class="score-title">LEADERBOARD</div>
      <div class="score-sub">Top Typists of All Time</div>
    </div>

    <div class="score-table-wrap">
      <div class="score-row header">
        <div>Rank</div>
        <div>Player</div>
        <div style="text-align:center">WPM</div>
        <div style="text-align:center">Accuracy</div>
        <div style="text-align:center">Level</div>
        <div style="text-align:right">Date</div>
      </div>
      <div id="score-list"></div>
    </div>

    <div class="nav-btns">
      <button class="btn" onclick="window.location.href='game.html'">KEEP PLAYING</button>
      <button class="btn btn-outline" onclick="window.location.href='Aindex.html'">CHANGE PLAYER</button>
      <button class="btn btn-outline" style="border-color:var(--error);color:var(--error)" onclick="clearScores()">CLEAR ALL</button>
    </div>
  </div>


</body>
</html>
